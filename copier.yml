# ============================================
# Kovasz - Geospatial Data Science Template
# ============================================

# Questions
project_name:
  type: str
  help: Project name (lowercase, hyphens ok)
  default: "{{ _folder_name }}"
  validator: >-
    {% if not project_name | regex_search('^[a-z][a-z0-9-]*$') %}
    Must be lowercase, start with letter, use only letters/numbers/hyphens
    {% endif %}

description:
  type: str
  help: Short project description
  default: ""

author:
  type: str
  help: Author name
  default: ""


# ============================================
# Template settings
# ============================================
_subdirectory: template
_templates_suffix: .jinja

# Skip these patterns
_skip_if_exists:
  - "*.ipynb"
  - "data/**"

# ============================================
# Success message
# ============================================
_message_after_copy: |

  ✓ Project '{{ project_name }}' created!

  Next steps:
    cd {{ project_name }}
    make run

_tasks:
  - "git init"
  - "uv venv"
  - "uv pip install -e ."
  - "uv run python -m ipykernel install --user --name {{ project_name }} --display-name 'Python ({{ project_name }})'"
  - "uv run pre-commit install"
  - "git add ."
  - "git commit -m 'init {{ project_name }} from kovasz template'"

_exclude:
  - README.md
